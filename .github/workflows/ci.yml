name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      build_all_platforms:
        description: "Build installers for Windows, macOS, and Linux"
        type: boolean
        default: true

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libcairo2 libpangocairo-1.0-0 fonts-liberation

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run linting
        working-directory: backend
        run: |
          pip install ruff mypy
          ruff check src/
          PYTHONPATH=src mypy src/ --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        run: pytest --cov=src --cov-report=xml --cov-fail-under=80
        env:
          REPODOC_ENV: test
          PYTHONPATH: src

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: backend/coverage.xml
          flags: backend

  # ─── Frontend Tests ─────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # No built-in cache here — electron/package-lock.json may not be
          # committed yet. Caching is handled manually below so a missing
          # lockfile never fails the whole job.

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ matrix.node-version }}-${{ hashFiles('electron/package-lock.json', 'electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.node-version }}-

      - name: Install dependencies
        working-directory: electron
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::No package-lock.json found — running npm install instead of npm ci. Commit the lockfile for reproducible builds."
            npm install
          fi

      - name: Type check
        working-directory: electron
        run: npm run typecheck

      - name: Lint
        working-directory: electron
        run: npm run lint

      - name: Run tests
        working-directory: electron
        run: npm run test:coverage

  # ─── Build Distributables ──────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: [backend-test, frontend-test]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-build-${{ hashFiles('electron/package-lock.json', 'electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-build-

      - name: Create Python venv for backend (Windows)
        working-directory: backend
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip --quiet
          .venv\Scripts\pip install -r requirements.txt --quiet --no-cache-dir

      - name: Install frontend deps
        working-directory: electron
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::No package-lock.json found — running npm install instead of npm ci."
            npm install
          fi

      - name: Build and package
        working-directory: electron
        run: npm run dist -- --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repodoc-pro-windows
          path: electron/release/*.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    needs: [backend-test, frontend-test]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-build-${{ hashFiles('electron/package-lock.json', 'electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-build-

      - name: Create Python venv for backend (macOS)
        working-directory: backend
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet
          .venv/bin/pip install -r requirements.txt --quiet --no-cache-dir

      - name: Install frontend deps
        working-directory: electron
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::No package-lock.json found — running npm install instead of npm ci."
            npm install
          fi

      - name: Build and package
        working-directory: electron
        run: npm run dist -- --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repodoc-pro-macos
          path: electron/release/*.dmg

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: [backend-test, frontend-test]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-build-${{ hashFiles('electron/package-lock.json', 'electron/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-build-

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libcairo2 libpangocairo-1.0-0 fonts-liberation

      - name: Create Python venv for backend (Linux)
        working-directory: backend
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet
          .venv/bin/pip install -r requirements.txt --quiet --no-cache-dir

      - name: Install frontend deps
        working-directory: electron
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::No package-lock.json found — running npm install instead of npm ci."
            npm install
          fi

      - name: Build and package
        working-directory: electron
        run: npm run dist -- --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repodoc-pro-linux
          path: electron/release/*.AppImage

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
